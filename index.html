<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziyad 28dz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* الحاوية */
.container {
  text-align: center;
  animation: fadeIn 2s ease;
}

/* العنوان */
h1 {
  font-size: 50px;
  margin-bottom: 20px;
  background: linear-gradient(45deg, #00f5a0, #00d9f5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* النص */
p {
  font-size: 20px;
  margin-bottom: 30px;
  opacity: 0.8;
}

/* الزر */
.btn {
  padding: 15px 30px;
  border: none;
  background: linear-gradient(45deg, #ff512f, #dd2476);
  color: white;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

/* تأثير */
.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff512f;
}

/* أنيميشن */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>ziyad 28dz يرحب بكم 👑</h1>
  <p>موقع احترافي بتصميم عصري</p>
  <button class="btn" onclick="showMessage()">ابدأ الآن</button>
</div>

<script>
function showMessage() {
  alert("مرحبا بك في عالم زياد 🔥");
}
</script>

</body>
</html>
