<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>ZW-28-DZ.COM</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }
    /* خلفية الفيديو */
    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
    }
    /* شاشة الدخول */
    .login-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container h1 {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #fff;
    }
    .login-container input {
      margin: 10px;
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    .login-container button {
      margin: 10px;
      padding: 10px;
      width: 270px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    #login-btn {
      animation: colorChange 5s infinite;
    }
    @keyframes colorChange {
      0% {background-color: red;}
      25% {background-color: blue;}
      50% {background-color: green;}
      75% {background-color: purple;}
      100% {background-color: orange;}
    }
    .social-btn {
      margin: 5px;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .social-icons div {
      margin: 10px;
    }
    /* الرسائل المنبثقة */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 10px;
      color: white;
      font-size: 20px;
    }
    /* الشاشة الرئيسية */
    .home {
      display: none;
      padding: 20px;
    }
    .navbar {
      display: flex;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      padding: 10px;
    }
    .navbar button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
    .products {
      margin-top: 20px;
    }
    /* زر الاعدادات */
    #admin-btn {
      display: none;
      margin: 20px;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      animation: colorChange 5s infinite;
    }
    .admin-page {
      display: none;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- فيديو الخلفية -->
  <video autoplay muted loop id="bg-video">
    <source src="https://www.youtube.com/embed/RzVvThhjAKw?autoplay=1&mute=1&loop=1" type="video/mp4">
  </video>

  <!-- موسيقى الخلفية -->
  <audio autoplay loop>
    <source src="https://www.youtube.com/embed/fY_t3wFX6q8" type="audio/mp3">
  </audio>

  <!-- شاشة الدخول -->
  <div class="login-container" id="login-page">
    <div style="position:absolute;top:10px;right:10px;">ZW-28-DZ.COM</div>
    <h1>مــرحــــبـــا بـــكـــم في مـــوقــعـــنـــا</h1>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="togglePassword()">👁 إظهار/إخفاء</button>
    <button id="login-btn" onclick="login()">تسجيل الدخول</button>
    <button class="social-btn" style="background:red;" onclick="socialLogin('gmail')">المتابعة باستخدام Gmail</button>
    <button class="social-btn" style="background:blue;" onclick="socialLogin('facebook')">المتابعة باستخدام Facebook</button>
    <div class="social-icons">
      <div><img src="instagram.png" width="40"><br><button onclick="alertMsg()">تابعنا</button></div>
      <div><img src="facebook.png" width="40"><br><button onclick="alertMsg()">تابعنا</button></div>
      <div><img src="telegram.png" width="40"><br><button onclick="alertMsg()">تابعنا</button></div>
      <div><img src="discord.png" width="40"><br><button onclick="alertMsg()">تابعنا</button></div>
    </div>
  </div>

  <!-- رسالة منبثقة -->
  <div class="modal" id="success-msg">مبروك عليك !! لقد تم التسجيل بنجاح ✅</div>

  <!-- الشاشة الرئيسية -->
  <div class="home" id="home-page">
    <button style="background:gray;" onclick="support()">🎧 الدعم والمساعدة</button>
    <br><input type="text" placeholder="البحث عن المنتجات" style="background:rgba(0,0,255,0.3);">
    <button onclick="chooseLang()">🌐 اللغة</button>
    <div class="navbar">
      <button>الكل</button>
      <button>عروض اليوم</button>
      <button>بطاقات الخصم</button>
      <button>السجل</button>
      <button>خدمة العملاء</button>
    </div>
    <div class="products">
      <h2>اكتشف العروض دلع نفسك معنا !!!</h2>
      <img src="bag.png" width="100">
      <img src="headphones.png" width="100">
    </div>
    <button id="admin-btn" onclick="openAdmin()">⚙️ إعدادات الموقع</button>
  </div>

  <!-- صفحة الإدارة -->
  <div class="admin-page" id="admin-page">
    <h2>إعدادات الموقع</h2>
    <button onclick="alert('صفحة الإعدادات: تغيير الخلفية، الاسم، الإدارة...')">الإعدادات</button>
    <button onclick="alert('صفحة البائعين: إضافة/طرد/تعديل صلاحيات')">البائعين</button>
    <button onclick="alert('قائمة الحظر: إدارة المحظورين')">قائمة الحظر</button>
  </div>

<script>
  function togglePassword(){
    let pass = document.getElementById("password");
    pass.type = (pass.type === "password") ? "text" : "password";
  }
  function login(){
    document.getElementById("success-msg").style.display = "block";
    setTimeout(()=>{
      document.getElementById("login-page").style.display="none";
      document.getElementById("home-page").style.display="block";
      // إظهار زر الإدارة فقط لصاحب البريد
      let user = document.getElementById("username").value;
      if(user === "ziyadz159z@gmail.com"){
        document.getElementById("admin-btn").style.display="block";
      }
    },2000);
  }
  function socialLogin(type){
    alert("سيتم تحويلك إلى " + type);
    document.getElementById("login-page").style.display="none";
    document.getElementById("home-page").style.display="block";
  }
  function alertMsg(){
    alert("لم يتم تعيين أي رابط");
  }
  function support(){
    alert("يرجى التواصل عبر الجمايل: ziyadz159z@gmail.com");
  }
  function chooseLang(){
    alert("اختر اللغة: العربية / الإنجليزية / الفرنسية / الإسبانية ...");
  }
  function openAdmin(){
    document.getElementById("home-page").style.display="none";
    document.getElementById("admin-page").style.display="block";
  }
</script>

</body>
</html>
